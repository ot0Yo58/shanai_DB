<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社員登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>

<header class="app-header">
    <div>
        <h1>社員カルテDB</h1>
        <p>Employee Profile Database</p>
    </div>
</header>

<main class="container">

    <div class="page-head">
        <div>
            <h2>社員登録</h2>
            <p class="sub-text">基本情報を登録します。</p>
        </div>
        <a class="btn ghost" th:href="@{/employees}">一覧へ戻る</a>
    </div>

    <section class="card">
        <form th:action="@{/employees}" method="post" th:object="${employee}" class="form-grid">

            <div class="form-group">
                <label>社員番号</label>
                <input type="text" th:field="*{employeeCode}" placeholder="例：E001">
            </div>

            <div class="form-group">
                <label>名前 <span class="required">必須</span></label>
                <input type="text" th:field="*{name}" placeholder="例：山田 太郎">
                <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="form-group">
                <label>名前カナ</label>
                <input type="text" th:field="*{nameKana}" placeholder="例：ヤマダ タロウ">
            </div>

            <div class="form-group">
                <label>生年月日</label>
                <input type="date" th:field="*{birthday}">
            </div>

            <div class="form-group">
                <label>入社日</label>
                <input type="date" th:field="*{joinDate}">
            </div>

            <div class="form-group">
                <label>通勤方法</label>
                <input type="text" th:field="*{commuteMethod}" placeholder="例：車、電車、徒歩">
            </div>

            <div class="form-group full">
                <label>住所</label>
                <textarea th:field="*{address}" rows="3"></textarea>
            </div>

            <div class="form-group full">
                <label>今後の展望</label>
                <textarea th:field="*{futureVision}" rows="4" placeholder="例：System課配属を目指している、教育担当に興味がある等"></textarea>
            </div>

            <div class="form-group full">
                <label>メモ</label>
                <textarea th:field="*{memo}" rows="4"></textarea>
            </div>

            <div class="form-actions full">
                <button class="btn primary" type="submit">登録する</button>
                <a class="btn ghost" th:href="@{/employees}">キャンセル</a>
            </div>
        </form>
    </section>

</main>

</body>
</html>
